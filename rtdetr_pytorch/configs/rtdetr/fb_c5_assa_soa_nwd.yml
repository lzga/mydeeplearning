__include__: [
  '../dataset/pcb_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetr_r50vd.yml',
]

# FB-C5 + ASSA + mAP50-oriented small-object-aware NWD.
# NWD is applied only to the final decoder output and is weighted by target size.
output_dir: "D:/Learn/RTDETR/RT-DETR-main/output/fb_c5_assa_soa_nwd_map50"

epoches: 200
checkpoint_step: 50

PResNet:
  depth: 18
  freeze_at: -1
  freeze_norm: False
  pretrained: True

  use_fasterblock: True
  fasterblock_replace_stages: [3]
  fasterblock_replace_mode: last
  fasterblock_n_div: 4
  fasterblock_mlp_ratio: 2.0

HybridEncoder:
  in_channels: [128, 256, 512]
  hidden_dim: 256
  expansion: 0.5
  # ASSA
  use_assa: true
  assa_topk_ratio: 0.75
  assa_warmup_epochs: 5

RTDETRTransformer:
  eval_idx: -1
  num_decoder_layers: 3
  num_denoising: 100

SetCriterion:
  use_small_object_aware_nwd: true
  soa_nwd_constant: 16.0
  soa_nwd_input_size: 640.0
  soa_nwd_small_threshold: 16.0
  soa_nwd_medium_threshold: 32.0
  soa_nwd_small_weight: 0.15
  soa_nwd_medium_weight: 0.05
  soa_nwd_large_weight: 0.0
  soa_nwd_main_only: true

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?=.*norm).*$'
      lr: 0.00001
      weight_decay: 0.
    -
      params: '^(?=.*backbone)(?!.*norm).*$'
      lr: 0.00001
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bias)).*$'
      weight_decay: 0.

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001
